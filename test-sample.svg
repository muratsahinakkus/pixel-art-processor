<?xml version="1.0" encoding="UTF-8"?>
<!-- 7x7 grid: outer ring gray (border), inner 5x5 colored pixels, pixel=10pt gap=3pt -->
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- Row 0 (gray border) -->
  <rect x="0"  y="0"  width="10" height="10" fill="#888888"/>
  <rect x="13" y="0"  width="10" height="10" fill="#888888"/>
  <rect x="26" y="0"  width="10" height="10" fill="#888888"/>
  <rect x="39" y="0"  width="10" height="10" fill="#888888"/>
  <rect x="52" y="0"  width="10" height="10" fill="#888888"/>
  <rect x="65" y="0"  width="10" height="10" fill="#888888"/>
  <rect x="78" y="0"  width="10" height="10" fill="#888888"/>

  <!-- Row 1 -->
  <rect x="0"  y="13" width="10" height="10" fill="#888888"/>
  <rect x="13" y="13" width="10" height="10" fill="#e8624a"/>
  <rect x="26" y="13" width="10" height="10" fill="#4a9ee8"/>
  <rect x="39" y="13" width="10" height="10" fill="#e8624a"/>
  <rect x="52" y="13" width="10" height="10" fill="#4a9ee8"/>
  <rect x="65" y="13" width="10" height="10" fill="#e8624a"/>
  <rect x="78" y="13" width="10" height="10" fill="#888888"/>

  <!-- Row 2 -->
  <rect x="0"  y="26" width="10" height="10" fill="#888888"/>
  <rect x="13" y="26" width="10" height="10" fill="#4ae86f"/>
  <rect x="26" y="26" width="10" height="10" fill="#e8d44a"/>
  <rect x="39" y="26" width="10" height="10" fill="#e8624a"/>
  <rect x="52" y="26" width="10" height="10" fill="#4ae86f"/>
  <rect x="65" y="26" width="10" height="10" fill="#e8d44a"/>
  <rect x="78" y="26" width="10" height="10" fill="#888888"/>

  <!-- Row 3 -->
  <rect x="0"  y="39" width="10" height="10" fill="#888888"/>
  <rect x="13" y="39" width="10" height="10" fill="#e8624a"/>
  <rect x="26" y="39" width="10" height="10" fill="#4a9ee8"/>
  <rect x="39" y="39" width="10" height="10" fill="#ffffff"/>
  <rect x="52" y="39" width="10" height="10" fill="#e8624a"/>
  <rect x="65" y="39" width="10" height="10" fill="#4ae86f"/>
  <rect x="78" y="39" width="10" height="10" fill="#888888"/>

  <!-- Row 4 -->
  <rect x="0"  y="52" width="10" height="10" fill="#888888"/>
  <rect x="13" y="52" width="10" height="10" fill="#4ae86f"/>
  <rect x="26" y="52" width="10" height="10" fill="#e8624a"/>
  <rect x="39" y="52" width="10" height="10" fill="#e8d44a"/>
  <rect x="52" y="52" width="10" height="10" fill="#4a9ee8"/>
  <rect x="65" y="52" width="10" height="10" fill="#e8624a"/>
  <rect x="78" y="52" width="10" height="10" fill="#888888"/>

  <!-- Row 5 -->
  <rect x="0"  y="65" width="10" height="10" fill="#888888"/>
  <rect x="13" y="65" width="10" height="10" fill="#e8d44a"/>
  <rect x="26" y="65" width="10" height="10" fill="#4ae86f"/>
  <rect x="39" y="65" width="10" height="10" fill="#e8624a"/>
  <rect x="52" y="65" width="10" height="10" fill="#4a9ee8"/>
  <rect x="65" y="65" width="10" height="10" fill="#e8d44a"/>
  <rect x="78" y="65" width="10" height="10" fill="#888888"/>

  <!-- Row 6 (gray border) -->
  <rect x="0"  y="78" width="10" height="10" fill="#888888"/>
  <rect x="13" y="78" width="10" height="10" fill="#888888"/>
  <rect x="26" y="78" width="10" height="10" fill="#888888"/>
  <rect x="39" y="78" width="10" height="10" fill="#888888"/>
  <rect x="52" y="78" width="10" height="10" fill="#888888"/>
  <rect x="65" y="78" width="10" height="10" fill="#888888"/>
  <rect x="78" y="78" width="10" height="10" fill="#888888"/>
</svg>
