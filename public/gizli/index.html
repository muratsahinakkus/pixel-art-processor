<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .box {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 10px;
      padding: 40px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 { font-size: 16px; font-weight: 600; }
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e0dfd8;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #333; }
    button {
      width: 100%;
      padding: 9px;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    #result { display: none; flex-direction: column; gap: 12px; }
    #err { color: #d0291e; font-size: 12px; display: none; }
    .ga-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f5f5f0;
      border: 1px solid #e0dfd8;
      border-radius: 8px;
      padding: 14px 16px;
      text-decoration: none;
      color: #1a1a18;
      transition: border-color 0.15s;
    }
    .ga-link:hover { border-color: #333; }
    .ga-link-left { display: flex; flex-direction: column; gap: 3px; }
    .ga-link-title { font-size: 13px; font-weight: 600; }
    .ga-link-sub { font-size: 11px; color: #6b6b65; }
    .ga-arrow { font-size: 16px; color: #6b6b65; }
    .hint { font-size: 11px; color: #6b6b65; }
  </style>
</head>
<body>
  <div class="box">
    <div id="login-form">
      <h2>🔒</h2>
      <input type="password" id="pw" placeholder="Şifre" autocomplete="off" />
      <p id="err">Yanlış şifre.</p>
      <button onclick="check()">Giriş</button>
    </div>

    <div id="result">
      <a
        class="ga-link"
        href="https://analytics.google.com/analytics/web/#/p$(GA_PROP)/reports/reportinghub"
        target="_blank"
        rel="noopener"
        id="ga-href"
      >
        <div class="ga-link-left">
          <span class="ga-link-title">Google Analytics</span>
          <span class="ga-link-sub">Pixel Art Processor · G-R362PF79D4</span>
        </div>
        <span class="ga-arrow">↗</span>
      </a>
      <p class="hint">
        <strong>Sayfa ziyareti:</strong> Reports → Realtime veya Engagement → Overview<br><br>
        <strong>Dosya işlendi:</strong> Reports → Engagement → Events → <em>file_processed</em>
      </p>
    </div>
  </div>

  <script>
    const PASS = '081289Ma!'

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') check()
    })

    function check() {
      if (document.getElementById('pw').value !== PASS) {
        document.getElementById('err').style.display = 'block'
        return
      }
      document.getElementById('login-form').style.display = 'none'
      document.getElementById('result').style.display = 'flex'
    }
  </script>
</body>
</html>
