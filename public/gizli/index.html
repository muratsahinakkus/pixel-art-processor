<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .box {
      background: #fff;
      border: 1px solid #e0dfd8;
      border-radius: 10px;
      padding: 40px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h2 { font-size: 16px; font-weight: 600; }
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #e0dfd8;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #333; }
    button {
      width: 100%;
      padding: 9px;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
    #result { display: none; flex-direction: column; gap: 12px; }
    .stat-label { font-size: 12px; color: #6b6b65; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 48px; font-weight: 700; letter-spacing: -0.02em; }
    .stat-sub { font-size: 12px; color: #6b6b65; }
    #err { color: #d0291e; font-size: 12px; display: none; }
    #loading { color: #6b6b65; font-size: 13px; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <div id="login-form">
      <h2>🔒</h2>
      <input type="password" id="pw" placeholder="Şifre" autocomplete="off" />
      <p id="err">Yanlış şifre.</p>
      <button onclick="check()">Giriş</button>
    </div>
    <div id="result">
      <div style="display:flex;gap:24px;">
        <div style="flex:1;">
          <p class="stat-label">Sayfa ziyareti</p>
          <p class="stat-value" id="count-visits">—</p>
        </div>
        <div style="flex:1;">
          <p class="stat-label">Dosya işlendi</p>
          <p class="stat-value" id="count-usage">—</p>
        </div>
      </div>
      <p class="stat-sub" id="last-check"></p>
      <button onclick="refresh()" style="background:#f5f5f0;color:#1a1a18;border:1px solid #e0dfd8;">Yenile</button>
    </div>
    <p id="loading">Yükleniyor…</p>
  </div>

  <script>
    const PASS         = '081289Ma!'
    const API_VISITS   = 'https://api.countapi.xyz/get/pap-otsimo-murat/visits'
    const API_USAGE    = 'https://api.countapi.xyz/get/pap-otsimo-murat/usage'

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') check()
    })

    function check() {
      const val = document.getElementById('pw').value
      if (val !== PASS) {
        document.getElementById('err').style.display = 'block'
        return
      }
      document.getElementById('login-form').style.display = 'none'
      document.getElementById('loading').style.display = 'block'
      loadCount()
    }

    function loadCount() {
      Promise.all([
        fetch(API_VISITS).then(r => r.json()).catch(() => ({ value: null })),
        fetch(API_USAGE).then(r => r.json()).catch(() => ({ value: null })),
      ]).then(([visits, usage]) => {
        document.getElementById('loading').style.display = 'none'
        document.getElementById('result').style.display = 'flex'
        document.getElementById('count-visits').textContent =
          visits.value != null ? visits.value.toLocaleString('tr-TR') : '—'
        document.getElementById('count-usage').textContent =
          usage.value != null ? usage.value.toLocaleString('tr-TR') : '—'
        document.getElementById('last-check').textContent =
          'Son kontrol: ' + new Date().toLocaleString('tr-TR')
      })
    }

    function refresh() {
      document.getElementById('count-visits').textContent = '…'
      document.getElementById('count-usage').textContent = '…'
      loadCount()
    }
  </script>
</body>
</html>
